name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake \
            libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev libsoup-3.0-dev \
            libappindicator3-dev librsvg2-dev libasound2-dev \
            libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Upload all bundles
        uses: actions/upload-artifact@v4
        with:
          name: tunante-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files and generate latest.json
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.sig" \) -exec cp {} release/ \;

          # Generate latest.json for Tauri updater
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          NOTES="Release $TAG"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/jjolmo/tunante/releases/download/$TAG"

          # Find AppImage files and their signatures
          APPIMAGE_AMD64=$(ls release/*amd64*.AppImage 2>/dev/null | head -1 || true)
          APPIMAGE_ARM64=$(ls release/*arm64*.AppImage 2>/dev/null | head -1 || true)
          SIG_AMD64=$(cat "${APPIMAGE_AMD64}.sig" 2>/dev/null || echo "")
          SIG_ARM64=$(cat "${APPIMAGE_ARM64}.sig" 2>/dev/null || echo "")

          cat > release/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "$NOTES",
            "pub_date": "$DATE",
            "platforms": {
              "linux-x86_64": {
                "signature": "$SIG_AMD64",
                "url": "$BASE_URL/$(basename $APPIMAGE_AMD64 2>/dev/null || echo 'none')"
              },
              "linux-aarch64": {
                "signature": "$SIG_ARM64",
                "url": "$BASE_URL/$(basename $APPIMAGE_ARM64 2>/dev/null || echo 'none')"
              }
            }
          }
          ENDJSON
          ls -la release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Tunante ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
