name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # First job: bump version and create tag
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-bump patch version
        id: bump
        run: |
          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Check if HEAD is already tagged
          HEAD_TAG=$(git tag --points-at HEAD 2>/dev/null | head -1)
          if [ -n "$HEAD_TAG" ]; then
            echo "HEAD already tagged as $HEAD_TAG, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse and bump patch
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $LATEST_TAG -> $NEW_TAG"

          # Create and push tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake \
            libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev libsoup-3.0-dev \
            libappindicator3-dev librsvg2-dev libasound2-dev \
            libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Upload all bundles
        uses: actions/upload-artifact@v4
        with:
          name: tunante-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: [version, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Prepare release files and generate latest.json
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.sig" \) -exec cp {} release/ \;

          # Generate latest.json for Tauri updater
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/jjolmo/tunante/releases/download/$TAG"

          # Find AppImage files and their signatures
          APPIMAGE_AMD64=$(ls release/*amd64*.AppImage 2>/dev/null | head -1 || true)
          APPIMAGE_ARM64=$(ls release/*arm64*.AppImage 2>/dev/null | head -1 || true)
          SIG_AMD64=""
          SIG_ARM64=""
          [ -f "${APPIMAGE_AMD64}.sig" ] && SIG_AMD64=$(cat "${APPIMAGE_AMD64}.sig")
          [ -f "${APPIMAGE_ARM64}.sig" ] && SIG_ARM64=$(cat "${APPIMAGE_ARM64}.sig")

          APPIMAGE_AMD64_NAME=$(basename "$APPIMAGE_AMD64" 2>/dev/null || echo "none")
          APPIMAGE_ARM64_NAME=$(basename "$APPIMAGE_ARM64" 2>/dev/null || echo "none")

          cat > release/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "Release $TAG",
            "pub_date": "$DATE",
            "platforms": {
              "linux-x86_64": {
                "signature": "$SIG_AMD64",
                "url": "$BASE_URL/$APPIMAGE_AMD64_NAME"
              },
              "linux-aarch64": {
                "signature": "$SIG_ARM64",
                "url": "$BASE_URL/$APPIMAGE_ARM64_NAME"
              }
            }
          }
          ENDJSON
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Tunante ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
