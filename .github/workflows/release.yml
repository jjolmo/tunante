name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-bump patch version
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          HEAD_TAG=$(git tag --points-at HEAD 2>/dev/null | head -1)
          if [ -n "$HEAD_TAG" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake \
            libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev libsoup-3.0-dev \
            libappindicator3-dev librsvg2-dev libasound2-dev libfuse2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install -g @tauri-apps/cli
      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
      - uses: actions/upload-artifact@v4
        with:
          name: tunante-linux-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: windows-latest
    name: Windows
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install -g @tauri-apps/cli
      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
      - uses: actions/upload-artifact@v4
        with:
          name: tunante-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  build-macos:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
          - arch: aarch64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install -g @tauri-apps/cli
      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          MACOSX_DEPLOYMENT_TARGET: '11.0'
      - uses: actions/upload-artifact@v4
        with:
          name: tunante-macos-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  release:
    needs: [version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: echo "tag=${{ needs.version.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Prepare release files and generate latest.json
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.tar.gz" -o -name "*.sig" \) -exec cp {} release/ \;

          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/jjolmo/tunante/releases/download/$TAG"

          # Read signatures
          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }

          APPIMAGE_AMD64=$(ls release/*amd64*.AppImage 2>/dev/null | head -1 || true)
          APPIMAGE_ARM64=$(ls release/*arm64*.AppImage 2>/dev/null | head -1 || true)
          MSI=$(ls release/*.msi 2>/dev/null | grep -v '.sig' | head -1 || true)
          NSIS=$(ls release/*.exe 2>/dev/null | grep -v '.sig' | head -1 || true)
          DMG_X64=$(ls release/*x64*.dmg 2>/dev/null || ls release/*.dmg 2>/dev/null | head -1 || true)
          MACOS_X64_TAR=$(ls release/*x86_64*.app.tar.gz 2>/dev/null | head -1 || true)
          MACOS_ARM_TAR=$(ls release/*aarch64*.app.tar.gz 2>/dev/null | head -1 || true)

          name_or_none() { [ -n "$1" ] && basename "$1" || echo "none"; }

          cat > release/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "Release $TAG",
            "pub_date": "$DATE",
            "platforms": {
              "linux-x86_64": {
                "signature": "$(read_sig "${APPIMAGE_AMD64}.sig")",
                "url": "$BASE_URL/$(name_or_none "$APPIMAGE_AMD64")"
              },
              "linux-aarch64": {
                "signature": "$(read_sig "${APPIMAGE_ARM64}.sig")",
                "url": "$BASE_URL/$(name_or_none "$APPIMAGE_ARM64")"
              },
              "windows-x86_64": {
                "signature": "$(read_sig "${MSI}.sig")",
                "url": "$BASE_URL/$(name_or_none "$MSI")"
              },
              "darwin-x86_64": {
                "signature": "$(read_sig "${MACOS_X64_TAR}.sig")",
                "url": "$BASE_URL/$(name_or_none "$MACOS_X64_TAR")"
              },
              "darwin-aarch64": {
                "signature": "$(read_sig "${MACOS_ARM_TAR}.sig")",
                "url": "$BASE_URL/$(name_or_none "$MACOS_ARM_TAR")"
              }
            }
          }
          ENDJSON
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Tunante ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
