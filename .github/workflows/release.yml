name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake \
            libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev libsoup-3.0-dev \
            libappindicator3-dev librsvg2-dev libasound2-dev \
            libfuse2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Find artifacts
        id: artifacts
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          echo "appimage=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "appimage_name=$(basename $APPIMAGE)" >> "$GITHUB_OUTPUT"
          echo "deb_name=$(basename $DEB)" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: tunante-linux-${{ matrix.arch }}-appimage
          path: ${{ steps.artifacts.outputs.appimage }}

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: tunante-linux-${{ matrix.arch }}-deb
          path: ${{ steps.artifacts.outputs.deb }}

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release/ \;
          ls -la release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Tunante ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
