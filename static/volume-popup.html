<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #1e1e1e; overflow: hidden; -webkit-user-select: none; user-select: none; width: 100%; height: 100%; }
  .popup {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; height: 100%;
    padding: 0 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: white;
  }
  .bar-bg { width: 90px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: #4a9eff; border-radius: 2px; transition: width 0.08s ease-out; }
  .pct { font-size: 13px; font-weight: 600; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
  svg { flex-shrink: 0; }
</style>
</head>
<body>
<div class="popup">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
    <path id="vol-icon" d="M11 5L6 9H2v6h4l5 4V5z M15.54 8.46a1 1 0 00-1.42 1.42 3 3 0 010 4.24 1 1 0 001.42 1.42 5 5 0 000-7.08z"/>
  </svg>
  <div class="bar-bg"><div class="bar-fill" id="bar" style="width:80%"></div></div>
  <span class="pct" id="pct">80%</span>
</div>
<script>
  function setVolume(v) {
    var vol = Math.round(v * 100);
    document.getElementById('bar').style.width = vol + '%';
    document.getElementById('pct').textContent = vol + '%';
    var icon = document.getElementById('vol-icon');
    if (vol === 0) {
      icon.setAttribute('d', 'M11 5L6 9H2v6h4l5 4V5z M16.5 12l3.5-3.5-1.4-1.4L15 10.6l-3.5-3.5-1.4 1.4L13.6 12l-3.5 3.5 1.4 1.4L15 13.4l3.5 3.5 1.4-1.4z');
    } else {
      icon.setAttribute('d', 'M11 5L6 9H2v6h4l5 4V5z M15.54 8.46a1 1 0 00-1.42 1.42 3 3 0 010 4.24 1 1 0 001.42 1.42 5 5 0 000-7.08z');
    }
  }
</script>
</body>
</html>
